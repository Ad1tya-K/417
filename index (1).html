<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4:17 — The Version That Woke</title>
<style>
  /* ─── FONTS ─── */
  @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');

  /* ─── CSS VARIABLES ─── */
  :root {
    --bg: #080808;
    --bg2: #0d0d0d;
    --text: #c8c0b0;
    --text-dim: #5a5248;
    --text-bright: #e8e0d0;
    --accent: #8b1a1a;
    --accent2: #3a2a1a;
    --clock: #c04020;
    --flicker-speed: 0.08s;
  }

  /* ─── RESET & BASE ─── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier Prime', 'Courier New', monospace;
    font-size: 17px;
    line-height: 1.85;
    overflow: hidden;
    cursor: default;
    user-select: none;
  }

  /* ─── GRAIN OVERLAY ─── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999;
    opacity: 0.6;
  }

  /* ─── SCANLINE OVERLAY ─── */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none; z-index: 9998;
  }

  /* ─── WRAPPER ─── */
  #wrapper {
    position: fixed; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    transition: opacity 0.8s ease;
  }

  #wrapper.fade-out { opacity: 0; }

  /* ─── CLOCK ─── */
  #clock {
    position: fixed;
    top: 28px; right: 36px;
    font-family: 'Special Elite', serif;
    font-size: 13px;
    letter-spacing: 0.18em;
    color: var(--clock);
    opacity: 0.55;
    text-shadow: 0 0 12px rgba(192,64,32,0.4);
    animation: clockFlicker 7s infinite;
  }

  @keyframes clockFlicker {
    0%, 91%, 93%, 95%, 100% { opacity: 0.55; }
    92%, 94% { opacity: 0.12; }
  }

  /* ─── LOOP COUNTER (hidden but tracks) ─── */
  #loop-indicator {
    position: fixed;
    top: 28px; left: 36px;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    opacity: 0;
    transition: opacity 1s;
  }
  #loop-indicator.visible { opacity: 0.35; }

  /* ─── MAIN CONTENT BOX ─── */
  #scene-box {
    width: 100%;
    max-width: 620px;
    min-height: 200px;
    position: relative;
  }

  /* ─── NARRATIVE TEXT ─── */
  #narrative {
    font-size: 1em;
    color: var(--text);
    line-height: 2;
    min-height: 140px;
    text-align: left;
    white-space: pre-wrap;
    word-break: break-word;
  }

  #narrative.corrupted {
    animation: corrupt 0.15s steps(1) infinite;
  }

  @keyframes corrupt {
    0%   { clip-path: inset(0 0 95% 0); color: #ff2020; }
    20%  { clip-path: inset(10% 0 80% 0); color: var(--text); }
    40%  { clip-path: none; color: var(--text); }
    60%  { clip-path: inset(40% 0 55% 0); color: #c8c0b0; }
    80%  { clip-path: none; }
    100% { clip-path: none; }
  }

  /* ─── DIVIDER ─── */
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--text-dim) 30%, var(--text-dim) 70%, transparent);
    margin: 28px 0;
    opacity: 0.25;
  }

  /* ─── CHOICES ─── */
  #choices {
    display: flex;
    flex-direction: column;
    gap: 14px;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  #choices.visible { opacity: 1; }

  .choice-btn {
    background: transparent;
    border: 1px solid var(--text-dim);
    color: var(--text);
    font-family: 'Courier Prime', monospace;
    font-size: 0.88em;
    letter-spacing: 0.06em;
    text-align: left;
    padding: 13px 20px;
    cursor: pointer;
    position: relative;
    transition: all 0.25s ease;
    outline: none;
    overflow: hidden;
  }

  .choice-btn::before {
    content: '▸ ';
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .choice-btn:hover {
    border-color: var(--text);
    color: var(--text-bright);
    background: rgba(200,192,176,0.03);
    padding-left: 26px;
    text-shadow: 0 0 8px rgba(200,192,176,0.2);
  }
  .choice-btn:hover::before { opacity: 1; }

  .choice-btn.hidden-choice {
    border-color: var(--accent);
    color: var(--accent);
    font-style: italic;
    font-size: 0.8em;
  }
  .choice-btn.hidden-choice:hover {
    color: #ff6040;
    border-color: #ff4020;
    background: rgba(139,26,26,0.08);
  }

  .choice-btn:active { transform: translateX(3px); }

  /* ─── STATUS BAR ─── */
  #status-bar {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 28px;
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--text-dim);
    opacity: 0;
    transition: opacity 0.8s;
    text-transform: uppercase;
  }
  #status-bar.visible { opacity: 0.3; }

  /* ─── SCREEN SHAKE ─── */
  @keyframes shake {
    0%,100% { transform: translate(0,0); }
    10% { transform: translate(-3px, 1px); }
    20% { transform: translate(3px, -2px); }
    30% { transform: translate(-2px, 3px); }
    40% { transform: translate(2px, -1px); }
    50% { transform: translate(-1px, 2px); }
    60% { transform: translate(3px, 1px); }
    70% { transform: translate(-2px, -2px); }
    80% { transform: translate(1px, 3px); }
    90% { transform: translate(-3px, -1px); }
  }
  body.shaking { animation: shake 0.6s ease; }

  /* ─── GLITCH TEXT EFFECT ─── */
  @keyframes glitch1 {
    0%, 100% { clip-path: inset(30% 0 61% 0); transform: translate(-4px); }
    50% { clip-path: inset(51% 0 30% 0); transform: translate(4px); color: #ff2020; }
  }
  @keyframes glitch2 {
    0%, 100% { clip-path: inset(70% 0 5% 0); transform: translate(4px); }
    50% { clip-path: inset(5% 0 71% 0); transform: translate(-4px); color: #2020ff; }
  }

  .glitch-text {
    position: relative;
    display: inline-block;
  }
  .glitch-text::before,
  .glitch-text::after {
    content: attr(data-text);
    position: absolute;
    left: 0; top: 0;
    width: 100%;
  }
  .glitch-text::before { animation: glitch1 0.3s steps(1) infinite; }
  .glitch-text::after  { animation: glitch2 0.3s steps(1) infinite; }

  /* ─── TITLE SCREEN ─── */
  #title-screen {
    position: fixed; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 100;
    transition: opacity 1.2s ease;
    gap: 20px;
  }
  #title-screen.hidden { opacity: 0; pointer-events: none; }

  #title-main {
    font-family: 'Special Elite', serif;
    font-size: clamp(2rem, 6vw, 3.4rem);
    letter-spacing: 0.12em;
    color: var(--text-bright);
    text-align: center;
    text-shadow: 0 0 40px rgba(200,192,176,0.1);
  }

  #title-sub {
    font-size: 0.78em;
    letter-spacing: 0.28em;
    color: var(--text-dim);
    text-transform: uppercase;
    text-align: center;
  }

  #title-prompt {
    font-size: 0.72em;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    margin-top: 48px;
    animation: blink 2.2s infinite;
    cursor: pointer;
    text-transform: uppercase;
  }
  @keyframes blink { 0%,49%,100% { opacity:0.5; } 50%,99% { opacity:0.12; } }

  /* ─── VIGNETTE ─── */
  #vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center,
      transparent 40%,
      rgba(0,0,0,0.6) 100%);
    pointer-events: none;
    z-index: 500;
  }

  /* ─── BREATHING DARK OVERLAY ─── */
  #breath-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0);
    pointer-events: none;
    z-index: 490;
    animation: breathe 8s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100% { background: rgba(0,0,0,0); }
    50% { background: rgba(0,0,0,0.12); }
  }

  /* ─── ENDING SCREEN ─── */
  #ending-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 2s ease;
    text-align: center;
    padding: 40px;
    gap: 24px;
  }
  #ending-screen.visible { opacity: 1; pointer-events: all; }

  #ending-label {
    font-size: 0.72em;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  #ending-title {
    font-family: 'Special Elite', serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: var(--text-bright);
    letter-spacing: 0.1em;
  }
  #ending-text {
    font-size: 0.88em;
    color: var(--text);
    max-width: 480px;
    line-height: 2;
  }
  #restart-btn {
    margin-top: 32px;
    background: transparent;
    border: 1px solid var(--text-dim);
    color: var(--text-dim);
    font-family: 'Courier Prime', monospace;
    font-size: 0.78em;
    letter-spacing: 0.18em;
    padding: 11px 28px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.3s;
  }
  #restart-btn:hover { border-color: var(--text); color: var(--text); }

  /* ─── SCROLLABLE NARRATIVE AREA ─── */
  #scene-box {
    overflow-y: auto;
    max-height: calc(100vh - 200px);
    scrollbar-width: none;
  }
  #scene-box::-webkit-scrollbar { display: none; }

  /* ─── MOBILE ─── */
  @media (max-width: 520px) {
    #scene-box { padding: 0 4px; }
    #clock { top: 16px; right: 18px; font-size: 11px; }
    body { font-size: 15px; }
  }
</style>
</head>
<body>

<!-- ─── OVERLAYS ─── -->
<div id="vignette"></div>
<div id="breath-overlay"></div>

<!-- ─── CLOCK ─── -->
<div id="clock">4:17 AM</div>

<!-- ─── LOOP INDICATOR ─── -->
<div id="loop-indicator" aria-hidden="true">—</div>

<!-- ─── TITLE SCREEN ─── -->
<div id="title-screen">
  <div id="title-main">4:17</div>
  <div id="title-sub">The Version That Woke</div>
  <div id="title-prompt" onclick="startGame()">[ touch to wake ]</div>
</div>

<!-- ─── MAIN WRAPPER ─── -->
<div id="wrapper">
  <div id="scene-box">
    <div id="narrative"></div>
    <div class="divider" id="divider" style="display:none"></div>
    <div id="choices"></div>
  </div>
</div>

<!-- ─── ENDING SCREEN ─── -->
<div id="ending-screen">
  <div id="ending-label">ENDING</div>
  <div id="ending-title"></div>
  <div id="ending-text"></div>
  <button id="restart-btn" onclick="restartGame()">wake again</button>
</div>

<!-- ─── STATUS BAR ─── -->
<div id="status-bar">
  <span id="stat-awareness">awareness: 0</span>
  <span id="stat-loop">loop: 0</span>
</div>

<script>
/* ════════════════════════════════════════════
   4:17 — THE VERSION THAT WOKE
   Full psychological horror game engine
   ════════════════════════════════════════════ */

// ─── GAME STATE ───────────────────────────────
let state = {
  loopCount: 0,
  awareness: 0,    // 0–10: understanding of the loop
  aggression: 0,   // 0–10: hostility toward entity
  sacrifice: false,
  denial: 0,       // 0–5: refusing to engage
  memory: 0,       // 0–10: retained knowledge
  openedDoor: false,
  heardVoice: false,
  touchedPhone: false,
  agreedWithSelf: false,
  resistedSelf: false,
  secretPath: false,  // for Break the Loop ending
};

// Persistent across restarts — stored in session
let persistentMemory = {
  totalWakes: 0,
  endingsSeen: [],
};

// ─── AUDIO ENGINE ────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let ambientNode = null;
let ambientGain = null;

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new AudioCtx();

    // ── Ambient hum: layered drone ──
    ambientGain = audioCtx.createGain();
    ambientGain.gain.setValueAtTime(0, audioCtx.currentTime);
    ambientGain.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 4);
    ambientGain.connect(audioCtx.destination);

    // Sub-bass drone
    const osc1 = audioCtx.createOscillator();
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(42, audioCtx.currentTime);
    osc1.frequency.linearRampToValueAtTime(38, audioCtx.currentTime + 20);
    osc1.connect(ambientGain);
    osc1.start();

    // Harmonic layer
    const osc2 = audioCtx.createOscillator();
    osc2.type = 'triangle';
    osc2.frequency.setValueAtTime(84.2, audioCtx.currentTime);
    const g2 = audioCtx.createGain();
    g2.gain.value = 0.3;
    osc2.connect(g2);
    g2.connect(ambientGain);
    osc2.start();

    // Noise texture
    const bufferSize = audioCtx.sampleRate * 3;
    const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

    const noiseSource = audioCtx.createBufferSource();
    noiseSource.buffer = noiseBuffer;
    noiseSource.loop = true;

    const noiseFilter = audioCtx.createBiquadFilter();
    noiseFilter.type = 'lowpass';
    noiseFilter.frequency.value = 120;

    const noiseGain = audioCtx.createGain();
    noiseGain.gain.value = 0.018;

    noiseSource.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(audioCtx.destination);
    noiseSource.start();

  } catch(e) { /* audio not available */ }
}

// Tapping sound effect
function playTap(times = 3) {
  if (!audioCtx) return;
  for (let i = 0; i < times; i++) {
    setTimeout(() => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(180, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.12);
    }, i * 380 + Math.random() * 80);
  }
}

// Tension sting
function playTension() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(60, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(45, audioCtx.currentTime + 1.2);
  gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0.0, audioCtx.currentTime + 1.2);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 1.2);
}

// Void tone for high-awareness moments
function playVoid() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(220, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 2);
  gain.gain.setValueAtTime(0.09, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.5);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 2.5);
}

// ─── TYPEWRITER ENGINE ──────────────────────
let typewriterTimer = null;
let typewriterQueue = [];
let isTyping = false;

function typeText(text, el, speed = 28, callback = null) {
  clearTimeout(typewriterTimer);
  el.textContent = '';
  isTyping = true;
  let i = 0;

  // Apply text corruption for high loop counts
  const displayText = corruptText(text);

  function tick() {
    if (i < displayText.length) {
      el.textContent += displayText[i];
      i++;
      // Variable speed: slower on punctuation for dramatic effect
      const ch = displayText[i - 1];
      let delay = speed;
      if (ch === '.' || ch === '…') delay = speed * 9;
      else if (ch === ',') delay = speed * 4;
      else if (ch === '\n') delay = speed * 6;
      else if (ch === ' ' && Math.random() < 0.04) delay = speed * 8; // random micro-pause
      typewriterTimer = setTimeout(tick, delay);
    } else {
      isTyping = false;
      if (callback) callback();
    }
  }
  tick();
}

// Text corruption based on loop count and state
function corruptText(text) {
  if (state.loopCount < 2 || state.awareness < 3) return text;

  const corruptionLevel = Math.min((state.loopCount - 1) * 0.07 + (state.awareness - 3) * 0.04, 0.22);
  const chars = text.split('');
  const corruptChars = ['▓','░','█','▒','◼','■','▪','◾'];

  return chars.map(ch => {
    if (ch === '\n' || ch === ' ') return ch;
    if (Math.random() < corruptionLevel * 0.3) {
      return corruptChars[Math.floor(Math.random() * corruptChars.length)];
    }
    return ch;
  }).join('');
}

// ─── SCENE RENDERER ────────────────────────────
function renderScene(sceneData) {
  const narrative = document.getElementById('narrative');
  const choices = document.getElementById('choices');
  const divider = document.getElementById('divider');
  const wrapper = document.getElementById('wrapper');

  // Fade out
  wrapper.classList.add('fade-out');

  setTimeout(() => {
    choices.innerHTML = '';
    choices.classList.remove('visible');
    divider.style.display = 'none';
    narrative.textContent = '';

    wrapper.classList.remove('fade-out');

    // Play audio cue if specified
    if (sceneData.audioCue) {
      switch(sceneData.audioCue) {
        case 'tap': setTimeout(() => playTap(sceneData.tapCount || 3), 600); break;
        case 'tension': setTimeout(playTension, 200); break;
        case 'void': setTimeout(playVoid, 300); break;
      }
    }

    // Shake if high tension
    if (sceneData.shake) triggerShake();

    // Update status
    updateStatusBar();

    // Type the narrative
    typeText(sceneData.text, narrative, 26, () => {
      // After typing: show choices
      if (sceneData.choices && sceneData.choices.length > 0) {
        divider.style.display = 'block';

        // Filter choices based on state
        const validChoices = sceneData.choices.filter(c => {
          if (!c.condition) return true;
          return c.condition(state);
        });

        validChoices.forEach(choice => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn' + (choice.hidden ? ' hidden-choice' : '');
          btn.textContent = choice.text;
          btn.onclick = () => {
            if (choice.effect) choice.effect(state);
            updateStatusBar();
            if (choice.ending) {
              triggerEnding(choice.ending);
            } else if (choice.next) {
              renderScene(choice.next());
            }
          };
          choices.appendChild(btn);
        });

        setTimeout(() => choices.classList.add('visible'), 100);
      }

      // Scroll to bottom
      const box = document.getElementById('scene-box');
      box.scrollTop = box.scrollHeight;
    });

  }, 700);
}

// ─── SCREEN EFFECTS ──────────────────────────
function triggerShake() {
  document.body.classList.remove('shaking');
  void document.body.offsetWidth;
  document.body.classList.add('shaking');
  setTimeout(() => document.body.classList.remove('shaking'), 700);
}

function triggerGlitch(duration = 300) {
  const narrative = document.getElementById('narrative');
  narrative.classList.add('corrupted');
  setTimeout(() => narrative.classList.remove('corrupted'), duration);
}

function updateStatusBar() {
  if (state.loopCount > 0 || state.awareness > 0) {
    document.getElementById('status-bar').classList.add('visible');
  }
  document.getElementById('stat-awareness').textContent = `awareness: ${state.awareness}`;
  document.getElementById('stat-loop').textContent = `loop: ${state.loopCount}`;

  // Loop indicator
  const loopEl = document.getElementById('loop-indicator');
  if (state.loopCount >= 2) {
    loopEl.classList.add('visible');
    loopEl.textContent = '⟳ ' + state.loopCount;
  }
}

// ─── ENDINGS ─────────────────────────────────
const ENDINGS = {
  loop_reset: {
    label: 'I — Loop Reset',
    title: 'You Wake at 4:17',
    text: `You open your eyes.\nThe ceiling. The dark. The hum.\nSomething taps at the door.\n\nYou have always been here.\nYou will always be here.\n\nYou close your eyes.`
  },
  inversion: {
    label: 'II — Inversion',
    title: 'The Watcher Wakes',
    text: `You are not on this side of the door anymore.\n\nYou understand now: you were never the one sleeping.\nYou were always the one watching.\n\nOn the other side, something stirs.\nIt opens its eyes.\nIt looks exactly like you did.`
  },
  replacement: {
    label: 'III — Replacement',
    title: 'The Version That Stayed',
    text: `It crosses the threshold.\nYou step back — once, then again — until there is no more room.\n\nIt stands where you stood.\nIt breathes how you breathed.\nIt is already forgetting your face.\n\nThe door closes.\nThe clock reads 4:17.`
  },

    text: `You said the words it did not expect.\nYou named it — not what it called itself, but what it was.\n\nThe tapping stopped.\nThe clock stuttered.\n\nFor the first time in every version of this night,\nthe room held its breath.\n\nAnd then: silence.\nReal silence.\nThe kind that means morning is coming.\n\nYou are the only version that made it to dawn.`

function triggerEnding(endingKey) {
  const ending = ENDINGS[endingKey];
  if (!ending) return;

  persistentMemory.endingsSeen.push(endingKey);

  playVoid();
  if (endingKey === 'break_the_loop') setTimeout(() => { if(audioCtx) ambientGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 3); }, 500);

  const screen = document.getElementById('ending-screen');
  document.getElementById('ending-label').textContent = 'ENDING ' + ending.label;
  document.getElementById('ending-title').textContent = ending.title;
  document.getElementById('ending-text').textContent = ending.text;

  setTimeout(() => {
    screen.classList.add('visible');
  }, 1200);
}

        text: `Stand up.`,
        effect: s => { s.awareness += 2; s.denial = Math.max(0, s.denial - 1); },
        next: scene_final_choice
      },
      {
        text: `Stay seated.`,
        effect: s => { s.denial += 3; },
        ending: 'inversion'
      }
    ]
  };
}

function scene_next_room() {
  triggerGlitch(600);
  return {
    text: `You walk through the door.\n\nThe next room is your room.\n\nExactly your room. Identical. The same furniture, the same dark, the same clock: 4:17.\n\nSame tapping from behind a door.`,
    audioCue: 'tap',
    tapCount: 3,
    choices: [
      {
        text: `Recognize what this is.`,
        effect: s => { s.awareness += 3; s.loopCount++; },
        next: () => scene_wake()
      }
    ]
  };
}

function scene_ask_it_to_leave() {
  return {
    text: `"After you," you say.\n\nIt considers this.\n\n"I can go. But I'll be on the other side of the next door."\n\nA pause.\n\n"And the one after that. Every door you open, I'll be on the other side."\n\n"Unless?"\n\nA pause.\n\n"Unless you leave before I get there."`,
    choices: [
      {
        text: `Move quickly.`,
        effect: s => { s.aggression += 1; s.awareness += 1; },
        next: scene_final_choice
      }
    ]
  };
}

// ─── FINAL CHOICE SCENE ──────────────────────
function scene_final_choice() {
  const loop = state.loopCount;
  const highAwareness = state.awareness >= 7;
  const highMemory = state.memory >= 4;

  let text;
  if (highAwareness && highMemory) {
    text = `The door.\n\nYou have been here ${loop + 1} time${loop > 0 ? 's' : ''}.\n\nYou remember: the tapping, the shadow, the entity, the versions of yourself. You remember things that predate this room.\n\nYou hold your shape.\n\nThe threshold.`;
  } else if (highAwareness) {
    text = `The door.\n\nYou understand the loop, the repetition, the versions.\nBut something has dissolved — specific memories, specific anchors.\n\nYou know what you are.\nYou're less sure you remember who.`;
  } else if (loop >= 3) {
    text = `The door.\n\nLoop ${loop + 1}.\n\nYou don't need to understand it anymore. You just need to go through.\n\nOr stay.\n\nThose have always been the two options.`;
  } else {
    text = `The door is in front of you.\n\nEvery version of this night ends here.\n\nWith a door.\n\nAnd a choice.`;
  }

  const choices = [
    {
      text: `Step through the door.`,
      effect: s => { s.loopCount += 1; s.awareness = Math.max(0, s.awareness - 1); s.memory = Math.max(0, s.memory - 1); },
      next: () => { startLoop(); return null; }
    },
    {
      text: `Step back into the room. Accept it.`,
      ending: 'inversion'
    }
  ];

  if (highAwareness && highMemory && state.secretPath) {
    choices.unshift({
      text: `[ hold your shape and walk through ]`,
      hidden: true,
      ending: 'break_the_loop'
    });
  }

  if (state.loopCount >= 4 && state.awareness >= 5) {
    choices.push({
      text: `Let it take everything. Become the room.`,
      ending: 'replacement'
    });
  }

  return { text, choices };
}

// ─── ADDITIONAL SMALLER SCENES ───────────────

function scene_entity_stands_aside() {
  return {
    text: `It steps aside.\n\nCompletely. Body language open, nothing threatening, nothing blocking.\n\nJust: an entity wearing your face, standing beside a door, waiting to see what you do with it.`,
    choices: [
      { text: `Walk through.`, effect: s => { s.openedDoor = true; }, next: scene_final_choice }
    ]
  };
}

function scene_ask_entity_to_leave() {
  return {
    text: `You ask it to leave.\n\nIt shakes its head — your shake, your head.\n\n"This is also my room now. Has been for a while."\n\nA pause.\n\n"But I'll stay out of your way if you go through the door."`,
    choices: [
      { text: `Go through the door.`, effect: s => { s.openedDoor = true; }, next: scene_final_choice }
    ]
  };
}

// ─── LOOP SYSTEM ────────────────────────────
function startLoop() {
  state.loopCount += 1;
  state.awareness = Math.max(0, state.awareness);
  state.memory = Math.max(0, state.memory);

  updateStatusBar();

  // Brief glitch between loops
  if (state.loopCount >= 2) {
    triggerGlitch(state.loopCount * 100);
    playTension();
  }
  if (state.loopCount >= 3) {
    triggerShake();
  }

  // Reset some flags but keep state
  state.openedDoor = false;
  state.heardVoice = false;
  state.touchedPhone = false;
  state.agreedWithSelf = false;

  renderScene(scene_wake());
}

// ─── GAME INIT ───────────────────────────────
function startGame() {
  initAudio();

  const titleScreen = document.getElementById('title-screen');
  titleScreen.classList.add('hidden');

  persistentMemory.totalWakes++;

  setTimeout(() => {
    renderScene(scene_wake());
  }, 1200);
}

function restartGame() {
  // Reset state but preserve some memory
  const prevLoops = state.loopCount;
  const prevMemory = state.memory;

  state = {
    loopCount: 0,
    awareness: Math.min(prevMemory > 5 ? 1 : 0, 2),
    aggression: 0,
    sacrifice: false,
    denial: 0,
    memory: Math.min(prevMemory > 5 ? 1 : 0, 2),
    openedDoor: false,
    heardVoice: false,
    touchedPhone: false,
    agreedWithSelf: false,
    resistedSelf: false,
    secretPath: false,
  };

  document.getElementById('ending-screen').classList.remove('visible');
  document.getElementById('status-bar').classList.remove('visible');
  document.getElementById('loop-indicator').classList.remove('visible');

  setTimeout(() => {
    renderScene(scene_wake());
  }, 800);
}

// ─── KEYBOARD SKIP (for dev/impatient players) ─
document.addEventListener('keydown', e => {
  // Escape skips typewriter
  if (e.key === 'Escape' && isTyping) {
    clearTimeout(typewriterTimer);
    isTyping = false;
    // Just complete the text immediately — hard to do without full text,
    // so we rely on the effect being minor.
  }
});

// ─── AMBIENT CLOCK FLICKER ───────────────────
setInterval(() => {
  if (Math.random() < 0.03) {
    const clock = document.getElementById('clock');
    const origText = clock.textContent;
    const glitchTexts = ['4:17 AM', '█:██ ██', '4:1█ AM', '▓:17 AM'];
    clock.textContent = glitchTexts[Math.floor(Math.random() * glitchTexts.length)];
    setTimeout(() => clock.textContent = origText, 120);
  }
}, 3000);

// ─── RANDOM TENSION PULSES ───────────────────
setInterval(() => {
  if (state.loopCount > 0 && Math.random() < 0.12) {
    if (audioCtx && ambientGain) {
      const now = audioCtx.currentTime;
      ambientGain.gain.cancelScheduledValues(now);
      ambientGain.gain.setValueAtTime(0.06, now);
      ambientGain.gain.linearRampToValueAtTime(0.11, now + 0.3);
      ambientGain.gain.linearRampToValueAtTime(0.06, now + 1.2);
    }
  }
}, 8000);

// ─── SCENE HELPER FUNCTIONS (STUBS) ──────────
// Some scenes referenced in choices need stubs
function scene_next_room_stub() { return scene_final_choice(); }

// Fix up next-references that might be null
function safeNext(fn) {
  return () => {
    const result = fn();
    return result || scene_final_choice();
  };
}
</script>
